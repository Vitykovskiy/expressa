name: Реализация - Frontend
description: Реализовать один экран или компонент frontend по точному Figma frame.
title: "[Frontend] "
labels:
  - "task_type: implementation"
  - "contour: frontend"
body:
  - type: markdown
    attributes:
      value: |
        Задача frontend-реализации. Design - единственный источник правды для UI.
        The `task_type` is fixed as `implementation`, contour as `frontend`.
  - type: input
    id: figma_frame
    attributes:
      label: figma_frame
      description: Прямая ссылка на точный Figma frame, не на проект и не на страницу.
      placeholder: https://www.figma.com/file/.../...?node-id=...
    validations:
      required: true
  - type: dropdown
    id: model
    attributes:
      label: model
      description: "Agent model for this task. from-config uses the value from .ai-dev-template.config.json"
      options:
        - from-config
        - claude
        - codex
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_block_task
    attributes:
      label: parent_block_task
      placeholder: "#456"
    validations:
      required: true
  - type: textarea
    id: user_scenario
    attributes:
      label: user_scenario
      description: Какой пользовательский сценарий обслуживает этот экран или компонент?
      placeholder: Опишите пользовательский поток и ожидаемый результат.
    validations:
      required: true
  - type: textarea
    id: api_contract
    attributes:
      label: api_contract
      description: API contract, если задача зависит от backend. Если зависимости нет, укажите `none`.
      placeholder: "endpoint, request schema, response schema - или `none`"
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: figma_frame link, docs/analysis/ui-specification.md, API contract issue link
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#789 or none"
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: Все пункты должны быть выполнены до перевода задачи в Ready.
      value: |
        - [ ] figma_frame указывает на конкретный frame, а не на проект или страницу
        - [ ] user_scenario заполнен
        - [ ] api_contract заполнен или явно указан как `none`
        - [ ] все зависимые задачи закрыты
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: Все пункты должны быть выполнены до закрытия задачи.
      value: |
        - [ ] Figma frame открыт через MCP до начала реализации
        - [ ] реализация соответствует Figma frame
        - [ ] сделан screenshot и выполнено сравнение с Figma frame по visual checklist
        - [ ] совпадают платформа, цвета, шрифт и направление layout
        - [ ] все проверки пройдены; любые расхождения задокументированы в комментарии до закрытия
        - [ ] код закоммичен и запушен
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: "high = блокирует другие задачи; medium = независимая задача реализации; low = улучшение без блокировки прогресса"
      options:
        - medium
        - high
        - low
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
