name: Деплой
description: Создать задачу деплоя для выкладки валидированного результата в целевое окружение.
title: "[Deploy] "
labels:
  - "task_type: deploy"
body:
  - type: markdown
    attributes:
      value: |
        Этот шаблон создаёт задачу деплоя для валидированного release slice.
        The `task_type` is fixed by this template as `deploy`.
  - type: dropdown
    id: owner_contour
    attributes:
      label: owner_contour
      options:
        - devops
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: build artifacts, environment notes, deployment checklist, linked implementation tasks
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#456, #457"
    validations:
      required: true
  - type: textarea
    id: rollout_scope
    attributes:
      label: Граница rollout
      description: Какое целевое окружение или release slice покрывает этот деплой?
      placeholder: Опишите окружение, границу релиза и ограничения rollout.
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      placeholder: Необходимые implementation-задачи завершены; prerequisites и runtime-требования к деплою задокументированы.
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      placeholder: Rollout успешен; evidence сохранён; downstream e2e task разблокирован.
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
