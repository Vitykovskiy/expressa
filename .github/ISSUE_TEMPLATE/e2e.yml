name: E2E-валидация
description: Создать задачу интеграционной проверки для block_delivery или задеплоенного release slice.
title: "[E2E] "
labels:
  - "task_type: e2e"
body:
  - type: markdown
    attributes:
      value: |
        Этот шаблон создаёт задачу интегрированной валидации.
        The `task_type` is fixed by this template as `e2e`.
  - type: dropdown
    id: owner_contour
    attributes:
      label: owner_contour
      options:
        - qa-e2e
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_block_task
    attributes:
      label: parent_block_task
      placeholder: "#456"
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: user scenarios, acceptance criteria, deployment evidence, linked block_delivery issue
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#456"
    validations:
      required: true
  - type: textarea
    id: validation_scope
    attributes:
      label: Граница валидации
      description: Какие интегрированные пользовательские сценарии или acceptance expectations нужно проверить?
      placeholder: Опишите целевой flow, окружение и границу acceptance.
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      placeholder: Block result находится в Waiting for Testing или деплой готов; сценарии и acceptance criteria актуальны.
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      placeholder: Критические сценарии проходят end-to-end; defects маршрутизированы корректно; рекомендация по релизу зафиксирована.
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
