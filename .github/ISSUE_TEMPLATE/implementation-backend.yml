name: Реализация - Backend
description: Реализовать один backend endpoint или изолированную service unit.
title: "[Backend] "
labels:
  - "task_type: implementation"
  - "contour: backend"
body:
  - type: markdown
    attributes:
      value: |
        Задача backend-реализации.
        The `task_type` is fixed as `implementation`, contour as `backend`.
  - type: dropdown
    id: model
    attributes:
      label: model
      description: "Agent model for this task. from-config uses the value from .ai-dev-template.config.json"
      options:
        - from-config
        - claude
        - codex
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: input
    id: parent_block_task
    attributes:
      label: parent_block_task
      placeholder: "#456"
    validations:
      required: true
  - type: textarea
    id: api_contract
    attributes:
      label: api_contract
      description: "API contract - endpoint, request schema, response schema."
      placeholder: "POST /api/orders - request: { item_id, quantity } - response: { order_id, status }"
    validations:
      required: true
  - type: textarea
    id: business_logic
    attributes:
      label: business_logic
      description: Какие бизнес-правила и ограничения должна реализовать эта задача.
      placeholder: Опишите инварианты, валидации и side effects.
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: docs/analysis/domain-model.md, docs/analysis/integration-contracts.md
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#789 or none"
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: Все пункты должны быть выполнены до перевода задачи в Ready.
      value: |
        - [ ] api_contract заполнен: endpoint, request schema, response schema
        - [ ] business_logic описан
        - [ ] все зависимые задачи закрыты
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: Все пункты должны быть выполнены до закрытия задачи.
      value: |
        - [ ] поведение endpoint соответствует api_contract
        - [ ] правила business logic соблюдаются и покрыты тестами
        - [ ] error paths обработаны явно
        - [ ] код закоммичен и запушен
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: "high = блокирует другие задачи; medium = независимая задача реализации; low = улучшение без блокировки прогресса"
      options:
        - medium
        - high
        - low
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
