name: Системный анализ
description: Создать задачу спецификации, которая готовит canonical analysis package для реализации.
title: "[System Analysis] "
labels:
  - "task_type: system_analysis"
body:
  - type: markdown
    attributes:
      value: |
        Этот шаблон создаёт задачу системного анализа, которая переводит инициативу в implementation-ready спецификацию.
        The `task_type` is fixed by this template as `system_analysis`.
  - type: dropdown
    id: owner_contour
    attributes:
      label: owner_contour
      options:
        - system-analyst
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      description: Укажите инициативу, исходные документы и любые prerequisite artifacts.
      placeholder: initiative issue, docs/analysis/*, upstream decisions
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: "#124"
    validations:
      required: true
  - type: textarea
    id: ui_screens
    attributes:
      label: ui_screens
      description: |
        Обязательно для инициатив с UI. Укажите каждый экран и точную ссылку на Figma frame.
        Формат строки: `Название экрана - https://www.figma.com/file/...?node-id=...`
        Если UI нет, укажите `none`.
      placeholder: |
        Home screen - https://www.figma.com/file/...?node-id=...
        Cart screen - https://www.figma.com/file/...?node-id=...
    validations:
      required: true
  - type: textarea
    id: decomposition_scope
    attributes:
      label: Граница декомпозиции
      description: Какие integrated blocks, контракты или открытые вопросы должна закрыть эта задача?
      placeholder: Опишите границу спецификации и декомпозиции.
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      placeholder: Контекст инициативы достаточен; входные ограничения зафиксированы; blocker'ы для анализа закрыты.
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      placeholder: Canonical analysis package готов; contour decomposition существует; нужные block_delivery и child issues опубликованы.
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
