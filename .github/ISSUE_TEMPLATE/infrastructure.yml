name: Инфраструктура
description: "Stage 0 - настроить CI/CD, VPS, secrets и переменные окружения до начала реализации."
title: "[Infrastructure] "
labels:
  - "task_type: infrastructure"
  - "contour: devops"
body:
  - type: markdown
    attributes:
      value: |
        Задача инфраструктуры Stage 0. Должна быть завершена до старта любых implementation-задач.
        The `task_type` is fixed as `infrastructure`, contour as `devops`.
  - type: dropdown
    id: model
    attributes:
      label: model
      description: "Agent model for this task. from-config uses the value from .ai-dev-template.config.json"
      options:
        - from-config
        - claude
        - codex
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: infrastructure_change
    attributes:
      label: infrastructure_change
      description: Какое инфраструктурное изменение выполняет эта задача?
      placeholder: Опишите настройку CI/CD, подготовку VPS или подключение окружений.
    validations:
      required: true
  - type: textarea
    id: env_vars_and_secrets
    attributes:
      label: env_vars_and_secrets
      description: Перечислите все переменные окружения и секреты, которые нужно подготовить.
      placeholder: "DATABASE_URL -> VPS env; API_KEY -> GitHub Secrets"
    validations:
      required: true
  - type: textarea
    id: target_environment
    attributes:
      label: target_environment
      description: На какое окружение нацелена эта задача?
      placeholder: staging / production
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: docs/04-tech-stack.md, docs/09-integrations.md, VPS access credentials
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: Все пункты должны быть выполнены до перевода задачи в Ready.
      value: |
        - [ ] infrastructure_change описан
        - [ ] список env_vars_and_secrets полный
        - [ ] target_environment указан: staging или production
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: Все пункты должны быть выполнены до закрытия задачи.
      value: |
        - [ ] CI/CD pipeline успешно проходит на push
        - [ ] VPS доступен и настроен
        - [ ] все secrets заведены в GitHub Secrets
        - [ ] все env vars заданы в целевом окружении
        - [ ] автодеплой на VPS запускается от ветки main
        - [ ] evidence закоммичен и запушен
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: "high = блокирует другие задачи; medium = независимая задача; low = улучшение без блокировки прогресса"
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
