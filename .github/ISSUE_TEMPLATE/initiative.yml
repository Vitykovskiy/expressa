name: Инициатива
description: Создать верхнеуровневую цель, которая запускает issue-driven delivery stream.
title: "[Initiative] "
labels:
  - "task_type: initiative"
body:
  - type: markdown
    attributes:
      value: |
        Этот шаблон создаёт верхнеуровневую точку входа для одного результата.
        The `task_type` is fixed by this template as `initiative`.
  - type: dropdown
    id: owner_contour
    attributes:
      label: owner_contour
      description: Основной owner contour для этой инициативы.
      options:
        - system-analyst
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Цель
      description: Какой результат должен существовать после завершения инициативы?
      placeholder: Опишите стратегический результат.
    validations:
      required: true
  - type: textarea
    id: parent_initiative
    attributes:
      label: parent_initiative
      description: Инициатива верхнеуровневая. Укажите `none`, если политика репозитория явно не требует вложенности.
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      description: Явно перечислите блокирующие задачи или укажите `none`.
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      description: Сошлитесь на запрос, исходные документы или prerequisite artifacts.
      placeholder: docs/01-product-vision.md, stakeholder request, issue links
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: Предусловия для старта этой инициативы.
      placeholder: Setup завершён; запрос определён; другая инициатива не покрывает тот же результат.
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: Какие evidence нужны для закрытия инициативы.
      placeholder: Дочерние задачи созданы; зависимости зафиксированы; GitHub Project отражает цепочку исполнения.
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      description: Начальный статус issue в GitHub Project.
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
